python-ml:
    candy:
        # GPU-accelerated Python ML environment (PyTorch / transformers / vLLM /
        # llama.cpp) on the local nvidia base (a heavy GPU image). The python-ml
        # layer owns the pixi.toml, so an explicit builder map is required (builder
        # maps do not cross the `charly` namespace boundary).
        base: nvidia
        builder:
            pixi: fedora-builder
            npm: fedora-builder
            cargo: fedora-builder
        platform:
            - linux/amd64
        candy:
            - '@github.com/opencharly/charly/candy/agent-forwarding:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/python-ml:v2026.183.1359'
