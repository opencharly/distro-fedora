fedora-test:
    candy:
        base: fedora
        # Builder maps do NOT cross the `charly` namespace boundary; testapi carries
        # a pixi.toml, so route pixi (plus the standard npm/cargo) to main's
        # fedora-builder under the `charly` namespace.
        builder:
            pixi: fedora-builder
            npm: fedora-builder
            cargo: fedora-builder
        candy:
            - '@github.com/opencharly/charly/candy/agent-forwarding:v2026.201.0706'
            - '@github.com/opencharly/charly/candy/traefik:v2026.201.0706'
            - '@github.com/opencharly/charly/candy/testapi:v2026.201.0706'
