jupyter:
    candy:
        base: fedora
        candy:
            - '@github.com/opencharly/charly/candy/agent-forwarding:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/jupyter:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/notebook-templates:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/dbus:v2026.183.1359'
        # No box-level check: the .ipynb-templates-provisioned probe lives on
        # candy/notebook-templates (notebook-templates-present, covering all 5 boxes
        # composing it), and the jupyter_mcp extension is covered by candy/jupyter-mcp
        # (jupyter-mcp-config-enabled) + candy/jupyter's deploy-scope mcp-* probes.
