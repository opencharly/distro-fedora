charly-fedora:
    candy:
        base: fedora
        # Builder maps do NOT cross the `charly` namespace boundary; route the
        # standard build formats to main's fedora-builder under the `charly`
        # namespace so any pixi/npm/cargo layer added here resolves.
        builder:
            pixi: fedora-builder
            npm: fedora-builder
            cargo: fedora-builder
        candy:
            - '@github.com/opencharly/charly/candy/agent-forwarding:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/supervisord:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/charly:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/golang:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/gh:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/sshd:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/container-nesting:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/nvidia:v2026.183.1359'
