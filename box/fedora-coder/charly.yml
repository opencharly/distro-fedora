fedora-coder:
    candy:
        base: fedora-nonfree
        # Builder maps do NOT cross the `charly` namespace boundary; route the
        # formats this image builds (pixi via pixi/uv, npm via nodejs, cargo
        # via rust) to main's fedora-builder under the `charly` namespace.
        builder:
            pixi: fedora-builder
            npm: fedora-builder
            cargo: fedora-builder
        candy:
            - '@github.com/opencharly/charly/candy/agent-forwarding:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/sshd:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/charly:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/charly-mcp:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/container-nesting:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/dbus:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/tmux:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/language-runtimes:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/golang:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/nodejs:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/rust:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/pixi:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/uv:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/build-toolchain:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/dev-tools:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/pre-commit:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/direnv:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/gh:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/typst:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/asciinema:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/claude-code:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/codex:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/gemini:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/forgecode:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/oracle:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/devops-tools:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/kubernetes:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/docker-ce:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/github-actions:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/google-cloud:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/google-cloud-npm:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/grafana-tools:v2026.183.1359'
        # No box-level check: every CLI / language / devops binary and the sshd +
        # charly-mcp ports belong to their providing candy's baked check
        # (claude-code/codex/gemini/forgecode, golang/nodejs/rust,
        # kubernetes/docker-ce/devops-tools/google-cloud, sshd, charly-mcp, charly),
        # so ONE candy check covers every coder box composing them.
