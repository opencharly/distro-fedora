immich-ml:
    candy:
        base: fedora
        platform:
            - linux/amd64
    immich-ml-candy:
        candy:
            - '@github.com/opencharly/charly/candy/agent-forwarding:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/nodejs:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/cuda:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/python-ml:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/supervisord:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/postgresql:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/vectorchord:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/redis:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/immich:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/immich-ml:v2026.183.1359'
            - '@github.com/opencharly/charly/candy/dbus:v2026.183.1359'
    immich-ml-services-running:
        check: command=supervisorctl status postgresql redis immich-server immich-ml | awk '{print $2}' | sort -u
        id: immich-ml-services-running
        exit_status: 0
        stdout:
            - RUNNING
        context:
            - runtime
        plugin: command
        plugin_input:
            command: supervisorctl status postgresql redis immich-server immich-ml | awk '{print $2}' | sort -u
            in_container: true
